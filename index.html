<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Brasil!</title>
    <link rel="icon" type="image/svg+xml" href="./brazil_flag.svg">
    <link rel="stylesheet" href="CSS/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cascadia+Code:ital,wght@0,200..700;1,200..700&family=Nunito:ital,wght@0,200..1000;1,200..1000&family=Rochester&display=swap" rel="stylesheet">

<body>
    
    <div class="spotify-widget">
        <iframe data-testid="embed-iframe" src="https://open.spotify.com/embed/track/5db65G6tr51dxxYpqKHi9x?utm_source=generator&si=56192741834a4e22" width="100%" height="152" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
    </div>

    <main>
        <section id="txt">
            <h1>"Vocês vão ter que me engolir!"</h1>
            <h3>Mário Jorge Lobo Zagallo</h3>
        </section>

        <section class="timeline">
            <div class="line-center"></div>

            <article class="timeline-item left">
                <div class="point"></div>
                <div class="content">
                    <img class="img_los" src="assets/img/1958.png" alt="Copa de 1958">

            <article class="timeline-item right">
                <div class="point"></div>
                <div class="content">
                    <img class="img_los" src="assets/img/1962.png" alt="Copa de 1962">
                </div>
            </article>

            <article class="timeline-item left">
                <div class="point"></div>
                <div class="content">
                    <img class="img_los" src="assets/img/1970.png" alt="Copa de 1970">
                </div>
            </article>

            <article class="timeline-item right">
                <div class="point"></div>
                <div class="content">
                    <a href="../1994/index.html">
                        <img class="img_los" src="assets/img/1994.png" alt="Copa de 1994">
                    </a>
                </div>
            </article>

            <article class="timeline-item left">
                <div class="point"></div>
                <div class="content">
                    <a href="../2002/index.html">
                        <img class="img_los" src="assets/img/2002.png" alt="Copa de 2002">
                    </a>
                </div>
            </article>
        </section>
    </main>

    <video id="vdo" autoplay muted loop src="https://github.com/Michelangelo-09/Projeto-Copa/raw/refs/heads/master/assets/video/brazil_video.mp4"></video>
